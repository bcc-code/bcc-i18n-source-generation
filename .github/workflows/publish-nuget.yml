name: Publish NuGet Package

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pack-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore "BccCode.I18N.SourceGen/BccCode.I18N.SourceGen/BccCode.I18N.SourceGen.csproj"

      - name: Build
        run: dotnet build "BccCode.I18N.SourceGen/BccCode.I18N.SourceGen/BccCode.I18N.SourceGen.csproj" --configuration Release --no-restore

      - name: Resolve package version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack (tag version)
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet pack "BccCode.I18N.SourceGen/BccCode.I18N.SourceGen/BccCode.I18N.SourceGen.csproj" --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }} --output ./artifacts

      - name: Pack (non-tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: dotnet pack "BccCode.I18N.SourceGen/BccCode.I18N.SourceGen/BccCode.I18N.SourceGen.csproj" --configuration Release --no-build --output ./artifacts

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

